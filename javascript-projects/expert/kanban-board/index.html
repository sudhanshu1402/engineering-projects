<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban System v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDED00;
            --black: #111111;
            --col-1: #FFFFFF;
            --col-2: #00F0FF;
            --col-3: #FF00FF;
            --border: 4px solid var(--black);
            --shadow: 8px 8px 0px var(--black);
            --shadow-hover: 12px 12px 0px var(--black);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 4rem 2rem;
            color: var(--black);
            background-image: radial-gradient(var(--black) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            display: inline-block;
            background: var(--col-1);
            padding: 1rem 3rem;
            border: var(--border);
            box-shadow: var(--shadow);
            transform: rotate(-2deg);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .column {
            background: var(--col-1);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 2rem;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.2s ease;
        }

        /* Column specific accents */
        #todo { background-color: var(--col-1); }
        #doing { background-color: var(--col-2); }
        #done { background-color: var(--col-3); }

        .column h2 {
            font-size: 2rem;
            text-transform: uppercase;
            border-bottom: var(--border);
            padding-bottom: 1rem;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column h2 span {
            font-size: 1rem;
            background: var(--black);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
        }

        .card {
            background: var(--col-1);
            border: var(--border);
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: grab;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px var(--black);
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: var(--shadow-hover);
            background: var(--black);
            color: white;
        }

        .card:active {
            cursor: grabbing;
        }

        /* Empty state for droppable area */
        .column-dropzone {
            flex-grow: 1;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kanban.SYS</h1>
    </header>

    <div class="board">
        <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>To Do <span>01</span></h2>
            <div class="column-dropzone">
                <div class="card" draggable="true" ondragstart="drag(event)" id="card1">Refactor Notification Gateway</div>
                <div class="card" draggable="true" ondragstart="drag(event)" id="card2">Migrate to Next.js 15</div>
            </div>
        </div>
        
        <div class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Doing <span>02</span></h2>
            <div class="column-dropzone">
                <div class="card" draggable="true" ondragstart="drag(event)" id="card3">Implement Zero-Trust Auth</div>
            </div>
        </div>
        
        <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Done <span>03</span></h2>
            <div class="column-dropzone">
                <div class="card" draggable="true" ondragstart="drag(event)" id="card4">Setup OTel Collector</div>
            </div>
        </div>
    </div>

    <script>
        function allowDrop(ev) { 
            ev.preventDefault(); 
        }
        function drag(ev) { 
            ev.dataTransfer.setData("text", ev.target.id); 
        }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            // Ensure we drop into the column-dropzone, not inside another card
            let dropTarget = ev.target;
            while(dropTarget && !dropTarget.classList.contains('column')) {
                dropTarget = dropTarget.parentElement;
            }
            if(dropTarget) {
                dropTarget.querySelector('.column-dropzone').appendChild(document.getElementById(data));
            }
        }
    </script>
</body>
</html>
