<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kanban Board</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f4f4f4;
        }

        .column {
            background: #e2e4e6;
            width: 30%;
            padding: 10px;
            border-radius: 5px;
        }

        .card {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            cursor: move;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>To Do</h2>
        <div class="card" draggable="true" ondragstart="drag(event)" id="card1">Task 1</div>
    </div>
    <div class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>Doing</h2>
    </div>
    <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>Done</h2>
    </div>
    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            ev.target.appendChild(document.getElementById(data));
        }
    </script>
</body>

</html>
