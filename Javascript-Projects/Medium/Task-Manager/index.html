<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F5F0;
            --text: #1A1A1A;
            --accent: #D32F2F;
            --border: #E0DDD1;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 8rem 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            margin-bottom: 5rem;
            position: relative;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        h1 i {
            font-style: italic;
            color: var(--accent);
        }

        .date-stamp {
            position: absolute;
            top: 15px;
            right: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
        }

        /* Input Block */
        .input-group {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--text);
            padding-bottom: 1rem;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--text);
        }

        input:focus {
            outline: none;
        }

        input::placeholder {
            color: #B0AFA6;
            font-style: italic;
        }

        button {
            background: transparent;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        button:hover {
            color: var(--accent);
        }

        /* Task List */
        ul {
            list-style: none;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 1.5rem;
            font-weight: 300;
            transition: all 0.4s ease;
        }

        li:hover {
            padding-left: 1rem;
            padding-right: 1rem;
            background: rgba(0,0,0,0.02);
        }

        .task-content {
            position: relative;
        }

        .task-content::after {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            width: 0%; height: 1px;
            background-color: var(--text);
            transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Done State */
        li.done .task-content {
            color: #A0A0A0;
            font-style: italic;
        }
        li.done .task-content::after {
            width: 100%;
        }

        .actions {
            display: flex;
            gap: 1.5rem;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }

        li:hover .actions {
            opacity: 1;
            transform: translateX(0);
        }

        .action-btn {
            font-size: 0.8rem;
            color: #888;
        }
        
        .action-btn.delete:hover {
            color: var(--accent);
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Focus <i>Index</i></h1>
            <div class="date-stamp" id="dateDisplay"></div>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Define a new objective...">
            <button onclick="addTask()">Commit</button>
        </div>

        <ul id="taskList">
            <!-- Example Pre-filled item -->
            <li>
                <span class="task-content">Finalize System Architecture Doc</span>
                <div class="actions">
                    <button class="action-btn" onclick="toggleDone(this)">Mark Done</button>
                    <button class="action-btn delete" onclick="this.closest('li').remove()">Remove</button>
                </div>
            </li>
        </ul>
    </div>

    <script>
        // Set date
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', options);

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text) {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="task-content">${text}</span>
                    <div class="actions">
                        <button class="action-btn" onclick="toggleDone(this)">Mark Done</button>
                        <button class="action-btn delete" onclick="this.closest('li').remove()">Remove</button>
                    </div>
                `;
                
                // Add with a subtle insertion animation
                li.style.opacity = '0';
                li.style.transform = 'translateY(-10px)';
                document.getElementById('taskList').prepend(li);
                
                // Trigger reflow
                void li.offsetWidth;
                li.style.opacity = '1';
                li.style.transform = 'translateY(0)';
                
                input.value = '';
            }
        }
        
        function toggleDone(btn) {
            const li = btn.closest('li');
            li.classList.toggle('done');
            btn.textContent = li.classList.contains('done') ? 'Undo' : 'Mark Done';
        }

        // Add Enter key support
        document.getElementById('taskInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
